server {
    listen 80;
    server_name jike.liqq19.asia;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jike.liqq19.asia;

    ssl_certificate /home/ssl/liqq19.asia/fullchain.pem;
    ssl_certificate_key /home/ssl/liqq19.asia/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/lzh_jike;
    index index.html;

    # API 反向代理（解决 Mixed Content 问题）
    location /v1_0/ {
        proxy_pass http://geek.itheima.net/v1_0/;
        proxy_set_header Host geek.itheima.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /index.html;
}
